<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#04080f"/>
      <stop offset="60%" style="stop-color:#060d1a"/>
      <stop offset="100%" style="stop-color:#020508"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0066ff"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9500"/>
      <stop offset="100%" style="stop-color:#ffcc00"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ff9500"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#00d4ff" stroke-width="1">
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="540" x2="1280" y2="540"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
  </g>

  <!-- Glow orbs background -->
  <ellipse cx="200" cy="360" rx="300" ry="280" fill="#00d4ff" opacity="0.03"/>
  <ellipse cx="1080" cy="360" rx="300" ry="280" fill="#ff9500" opacity="0.04"/>
  <ellipse cx="640" cy="360" rx="400" ry="300" fill="#7c3aed" opacity="0.03"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="720" fill="url(#cyanGrad)" opacity="0.8"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1280" height="5" fill="url(#cyanGrad)" opacity="0.6"/>

  <!-- Hexagon watermark background -->
  <polygon points="640,80 780,160 780,320 640,400 500,320 500,160" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.08"/>
  <polygon points="640,110 755,175 755,305 640,370 525,305 525,175" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.05"/>

  <!-- P logo orb -->
  <circle cx="180" cy="280" r="90" fill="#071422" stroke="#00d4ff" stroke-width="2" opacity="0.8" filter="url(#softglow)"/>
  <circle cx="180" cy="280" r="78" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <text x="180" y="305" font-family="Arial Black, Arial" font-size="72" font-weight="900" fill="#00d4ff" text-anchor="middle" filter="url(#glow)">P</text>
  <!-- checkmark tick on P -->
  <circle cx="225" cy="230" r="18" fill="#00ff88" opacity="0.9" filter="url(#glow)"/>
  <text x="225" y="237" font-family="Arial" font-size="16" font-weight="900" fill="#04080f" text-anchor="middle">✓</text>

  <!-- PROVUS title -->
  <text x="310" y="250" font-family="Arial Black, Arial" font-size="108" font-weight="900" fill="url(#titleGrad)" letter-spacing="8" filter="url(#softglow)">PROVUS</text>
  <text x="312" y="250" font-family="Arial Black, Arial" font-size="108" font-weight="900" fill="none" stroke="#00d4ff" stroke-width="1" letter-spacing="8" opacity="0.3">PROVUS</text>

  <!-- Subtitle -->
  <text x="312" y="300" font-family="Arial" font-size="22" fill="white" letter-spacing="6" opacity="0.7">AUTONOMOUS · ATTESTED · ON-CHAIN</text>

  <!-- Divider line -->
  <rect x="310" y="318" width="760" height="2" rx="1" fill="url(#cyanGrad)" opacity="0.5"/>

  <!-- Tagline -->
  <text x="640" y="375" font-family="Arial Black, Arial" font-size="32" font-weight="900" fill="white" text-anchor="middle" letter-spacing="2">Every AI trade decision. Sealed. Verified. Permanent.</text>

  <!-- Stat cards row -->
  <!-- Card 1 -->
  <rect x="80" y="430" width="250" height="110" rx="8" fill="#071422" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
  <rect x="80" y="430" width="250" height="4" rx="2" fill="#00d4ff" opacity="0.8"/>
  <text x="205" y="480" font-family="Arial Black, Arial" font-size="42" font-weight="900" fill="#00d4ff" text-anchor="middle" filter="url(#glow)">10K+</text>
  <text x="205" y="510" font-family="Arial" font-size="13" fill="white" text-anchor="middle" opacity="0.6" letter-spacing="2">ON-CHAIN TXS</text>
  <text x="205" y="530" font-family="Arial" font-size="11" fill="#00d4ff" text-anchor="middle" opacity="0.5">0G MAINNET VERIFIED</text>

  <!-- Card 2 -->
  <rect x="360" y="430" width="250" height="110" rx="8" fill="#071422" stroke="#ff9500" stroke-width="1.5" opacity="0.9"/>
  <rect x="360" y="430" width="250" height="4" rx="2" fill="#ff9500" opacity="0.8"/>
  <text x="485" y="480" font-family="Arial Black, Arial" font-size="42" font-weight="900" fill="#ff9500" text-anchor="middle" filter="url(#glow)">15s</text>
  <text x="485" y="510" font-family="Arial" font-size="13" fill="white" text-anchor="middle" opacity="0.6" letter-spacing="2">ATTEST CYCLE</text>
  <text x="485" y="530" font-family="Arial" font-size="11" fill="#ff9500" text-anchor="middle" opacity="0.5">DEEPSEEK V3.1 · TEE</text>

  <!-- Card 3 -->
  <rect x="640" y="430" width="250" height="110" rx="8" fill="#071422" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
  <rect x="640" y="430" width="250" height="4" rx="2" fill="#7c3aed" opacity="0.8"/>
  <text x="765" y="480" font-family="Arial Black, Arial" font-size="42" font-weight="900" fill="#a855f7" text-anchor="middle" filter="url(#glow)">847</text>
  <text x="765" y="510" font-family="Arial" font-size="13" fill="white" text-anchor="middle" opacity="0.6" letter-spacing="2">ELO SCORE</text>
  <text x="765" y="530" font-family="Arial" font-size="11" fill="#a855f7" text-anchor="middle" opacity="0.5">REPUTATION ENGINE</text>

  <!-- Card 4 -->
  <rect x="920" y="430" width="280" height="110" rx="8" fill="#071422" stroke="#00ff88" stroke-width="1.5" opacity="0.9"/>
  <rect x="920" y="430" width="280" height="4" rx="2" fill="#00ff88" opacity="0.8"/>
  <text x="1060" y="480" font-family="Arial Black, Arial" font-size="42" font-weight="900" fill="#00ff88" text-anchor="middle" filter="url(#glow)">99.7%</text>
  <text x="1060" y="510" font-family="Arial" font-size="13" fill="white" text-anchor="middle" opacity="0.6" letter-spacing="2">UPTIME</text>
  <text x="1060" y="530" font-family="Arial" font-size="11" fill="#00ff88" text-anchor="middle" opacity="0.5">RAILWAY · 24/7</text>

  <!-- Bottom bar -->
  <rect x="0" y="660" width="1280" height="60" fill="#071422" opacity="0.9"/>
  <rect x="0" y="660" width="1280" height="2" fill="url(#cyanGrad)" opacity="0.4"/>

  <!-- 0G badge -->
  <rect x="80" y="675" width="120" height="30" rx="4" fill="#00d4ff" opacity="0.15" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <text x="140" y="695" font-family="Arial Black, Arial" font-size="13" font-weight="900" fill="#00d4ff" text-anchor="middle" letter-spacing="2">0G MAINNET</text>

  <text x="640" y="693" font-family="Arial" font-size="13" fill="white" text-anchor="middle" opacity="0.4" letter-spacing="3">0G APAC HACKATHON 2026 · TRACK 2 VERIFIABLE FINANCE</text>

  <!-- LIVE indicator -->
  <circle cx="1140" cy="685" r="6" fill="#00ff88" opacity="0.9" filter="url(#glow)"/>
  <text x="1155" y="690" font-family="Arial" font-size="13" fill="#00ff88" opacity="0.8" letter-spacing="1">LIVE</text>

  <!-- Right accent bar -->
  <rect x="1274" y="0" width="6" height="720" fill="url(#amberGrad)" opacity="0.6"/>
</svg>
