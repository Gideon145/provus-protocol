    <text x="60" y="238" font-family="Arial" font-size="10" fill="#00ffa3" text-anchor="middle" font-weight="700">Apr 28</text>
    <text x="60" y="253" font-family="Arial" font-size="9" fill="#6e8bb5" text-anchor="middle">first tx</text>

    <circle cx="310" cy="142" r="5" fill="#ffd700"/>
    <text x="310" y="238" font-family="Arial" font-size="10" fill="#ffd700" text-anchor="middle" font-weight="700">May 5</text>
    <text x="310" y="253" font-family="Arial" font-size="9" fill="#6e8bb5" text-anchor="middle">50K · frontend live</text>

