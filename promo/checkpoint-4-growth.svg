    <path d="M 60,213 L 110,210 L 160,200 L 210,185 L 260,165 L 310,142 L 360,125 L 410,110 L 460,98 L 510,88 L 560,80 L 610,75 L 660,72 L 680,71" fill="none" stroke="url(#cyan)" stroke-width="3" filter="url(#glow)"/>
    <!-- area under curve -->
    <path d="M 60,213 L 110,210 L 160,200 L 210,185 L 260,165 L 310,142 L 360,125 L 410,110 L 460,98 L 510,88 L 560,80 L 610,75 L 660,72 L 680,71 L 680,215 L 60,215 Z" fill="#00d4ff" opacity="0.08"/>

