    <text x="24" y="78" font-family="Arial Black, Arial" font-size="32" fill="white">Vercel · Next.js</text>
    <text x="24" y="105" font-family="Arial" font-size="13" fill="#a0c8ff">wagmi · viem · TX decoder</text>
