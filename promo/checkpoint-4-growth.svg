  <rect x="60" y="585" width="1080" height="48" rx="10" fill="#0d1f35" stroke="#00d4ff" stroke-opacity="0.25"/>
  <text x="80" y="615" font-family="Arial" font-size="14" font-weight="700" fill="#00d4ff" letter-spacing="2">PROVUS-PROTOCOL-FRONTEND.VERCEL.APP · CLIENT-SIDE PROOF VERIFICATION</text>
  <text x="1120" y="615" font-family="Arial" font-size="13" fill="#6e8bb5" text-anchor="end">~50 TXs/min · 2 contracts called per cycle</text>
