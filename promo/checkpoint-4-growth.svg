  <g transform="translate(820, 425)">
    <rect width="320" height="125" rx="14" fill="url(#cardGrad)" stroke="#00ffa3" stroke-opacity="0.4"/>
    <text x="24" y="36" font-family="Arial" font-size="11" font-weight="700" fill="#00ffa3" letter-spacing="2">UPTIME · AUTONOMY</text>
    <text x="24" y="78" font-family="Arial Black, Arial" font-size="32" fill="white">99.7%</text>
