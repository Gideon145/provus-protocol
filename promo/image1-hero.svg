<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#04080f"/>
      <stop offset="100%" style="stop-color:#060d1a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0066ff"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#071422;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="1">
    <line x1="0" y1="135" x2="1200" y2="135"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="405" x2="1200" y2="405"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="200" y1="0" x2="200" y2="675"/>
    <line x1="400" y1="0" x2="400" y2="675"/>
    <line x1="600" y1="0" x2="600" y2="675"/>
    <line x1="800" y1="0" x2="800" y2="675"/>
    <line x1="1000" y1="0" x2="1000" y2="675"/>
  </g>

  <!-- Glow orb left -->
  <circle cx="180" cy="338" r="220" fill="#00d4ff" opacity="0.04" filter="url(#bigglow)"/>
  <!-- Glow orb right -->
  <circle cx="1020" cy="338" r="180" fill="#0066ff" opacity="0.05" filter="url(#bigglow)"/>

  <!-- Top label -->
  <rect x="480" y="52" width="240" height="28" rx="14" fill="#00d4ff" opacity="0.12"/>
  <text x="600" y="71" font-family="Arial" font-size="11" font-weight="700" fill="#00d4ff" text-anchor="middle" letter-spacing="3">0G APAC HACKATHON 2026</text>

  <!-- Main title -->
  <text x="600" y="170" font-family="Arial Black, Arial" font-size="86" font-weight="900" fill="white" text-anchor="middle" opacity="0.95">PROVUS</text>

  <!-- Gradient underline -->
  <rect x="340" y="182" width="520" height="4" rx="2" fill="url(#cyan)" filter="url(#glow)"/>

  <!-- Subtitle -->
  <text x="600" y="230" font-family="Arial" font-size="20" font-weight="400" fill="#a0c8ff" text-anchor="middle" letter-spacing="1" opacity="0.9">Autonomous AI Trading Agent · Cryptographic Attestation · 0G Chain</text>

  <!-- Stat cards row -->
  <!-- Card 1 -->
  <rect x="90" y="290" width="220" height="110" rx="12" fill="url(#cardGrad)" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
  <text x="200" y="335" font-family="Arial Black, Arial" font-size="42" font-weight="900" fill="#00d4ff" text-anchor="middle" filter="url(#glow)">10K+</text>
  <text x="200" y="362" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.6" letter-spacing="2">ON-CHAIN TXS</text>
  <text x="200" y="382" font-family="Arial" font-size="10" fill="#00d4ff" text-anchor="middle" opacity="0.5">0G MAINNET VERIFIED</text>

  <!-- Card 2 -->
  <rect x="340" y="290" width="220" height="110" rx="12" fill="url(#cardGrad)" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
  <text x="450" y="335" font-family="Arial Black, Arial" font-size="42" font-weight="900" fill="#00d4ff" text-anchor="middle" filter="url(#glow)">15s</text>
  <text x="450" y="362" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.6" letter-spacing="2">ATTEST CYCLE</text>
  <text x="450" y="382" font-family="Arial" font-size="10" fill="#00d4ff" text-anchor="middle" opacity="0.5">REAL-TIME AI DECISIONS</text>

  <!-- Card 3 -->
  <rect x="590" y="290" width="220" height="110" rx="12" fill="url(#cardGrad)" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
  <text x="700" y="335" font-family="Arial Black, Arial" font-size="42" font-weight="900" fill="#00d4ff" text-anchor="middle" filter="url(#glow)">847</text>
  <text x="700" y="362" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.6" letter-spacing="2">ELO REPUTATION</text>
  <text x="700" y="382" font-family="Arial" font-size="10" fill="#00d4ff" text-anchor="middle" opacity="0.5">EARNED ON-CHAIN</text>

  <!-- Card 4 -->
  <rect x="840" y="290" width="260" height="110" rx="12" fill="url(#cardGrad)" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.3"/>
  <text x="970" y="335" font-family="Arial Black, Arial" font-size="42" font-weight="900" fill="#00d4ff" text-anchor="middle" filter="url(#glow)">99.7%</text>
  <text x="970" y="362" font-family="Arial" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.6" letter-spacing="2">UPTIME</text>
  <text x="970" y="382" font-family="Arial" font-size="10" fill="#00d4ff" text-anchor="middle" opacity="0.5">AUTONOMOUS OPERATION</text>

  <!-- Tech stack badges -->
  <g transform="translate(600, 450)" text-anchor="middle">
    <rect x="-430" y="0" width="120" height="28" rx="14" fill="#0d1f35" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="-370" y="19" font-family="Arial" font-size="11" fill="#00d4ff" text-anchor="middle" letter-spacing="1">0G CHAIN</text>

    <rect x="-295" y="0" width="140" height="28" rx="14" fill="#0d1f35" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="-225" y="19" font-family="Arial" font-size="11" fill="#00d4ff" text-anchor="middle" letter-spacing="1">0G COMPUTE</text>

    <rect x="-140" y="0" width="140" height="28" rx="14" fill="#0d1f35" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="-70" y="19" font-family="Arial" font-size="11" fill="#00d4ff" text-anchor="middle" letter-spacing="1">DEEPSEEK TEE</text>

    <rect x="15" y="0" width="150" height="28" rx="14" fill="#0d1f35" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="90" y="19" font-family="Arial" font-size="11" fill="#00d4ff" text-anchor="middle" letter-spacing="1">ELO REPUTATION</text>

    <rect x="180" y="0" width="130" height="28" rx="14" fill="#0d1f35" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="245" y="19" font-family="Arial" font-size="11" fill="#00d4ff" text-anchor="middle" letter-spacing="1">NEXT.JS LIVE UI</text>

    <rect x="325" y="0" width="110" height="28" rx="14" fill="#0d1f35" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="380" y="19" font-family="Arial" font-size="11" fill="#00d4ff" text-anchor="middle" letter-spacing="1">SOLIDITY</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="560" font-family="Arial" font-size="15" fill="#ffffff" text-anchor="middle" opacity="0.45" letter-spacing="2">Every decision sealed. Every signature verified. Every trade permanent.</text>

  <!-- Bottom bar -->
  <rect x="0" y="640" width="1200" height="35" fill="#00d4ff" opacity="0.06"/>
  <text x="600" y="663" font-family="Arial" font-size="11" fill="#00d4ff" text-anchor="middle" letter-spacing="3" opacity="0.7">github.com/Gideon145/provus-protocol · 0G MAINNET CHAINID 16661</text>
</svg>
